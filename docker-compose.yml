version: "3.8"

services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    image: ghcr.io/stevenzhang2002/resume-creator/frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: ghcr.io/stevenzhang2002/resume-creator/backend:latest
    expose:
      - "8000"
    restart: unless-stopped
